# PostgreSQL Replication Configuration
# TaskirX v3 - Phase 5: Backup & Disaster Recovery
# Primary Server Configuration

# ============================================================================
# REPLICATION SETTINGS
# ============================================================================

# Enable WAL archiving and replication
wal_level = replica

# Maximum number of replication connections
max_wal_senders = 10

# Maximum number of standby connections
max_replication_slots = 10

# Delay replication by 0 (real-time)
recovery_min_apply_delay = 0

# ============================================================================
# WAL ARCHIVING
# ============================================================================

# Enable WAL archiving
archive_mode = on

# Archive command - copy WAL segments to backup location
# This allows point-in-time recovery
archive_command = 'test ! -f /backups/wal_archive/%f && cp %p /backups/wal_archive/%f'

# Timeout for archiving (seconds)
archive_timeout = 300

# ============================================================================
# CHECKPOINT & RECOVERY
# ============================================================================

# Checkpoint settings for performance and safety
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
max_wal_size = 4GB
min_wal_size = 1GB

# Recovery settings
full_page_writes = on
wal_compression = on
wal_buffers = 16MB

# ============================================================================
# SYNCHRONOUS REPLICATION (High Availability)
# ============================================================================

# Enable synchronous replication for zero data loss
synchronous_commit = remote_apply

# Standby server names that must acknowledge commits
# Configure this on the primary server
synchronous_standby_names = 'standby1,standby2'

# Number of standbys that must acknowledge
# Use ANY to wait for ANY standby, or n standbys
# Example: 'ANY 1 (standby1, standby2)' - waits for any 1 of 2 standbys
# Example: '2 (standby1, standby2)' - waits for both standbys

# ============================================================================
# LOGGING
# ============================================================================

# Log replication activity
log_replication_commands = on
log_connections = on
log_disconnections = on

# Log level for replication
log_min_duration_statement = 1000  # Log slow queries (> 1 second)

# ============================================================================
# CONNECTION SETTINGS
# ============================================================================

# Listen addresses - allow replication connections from standby servers
listen_addresses = '*'

# Maximum client connections
max_connections = 200

# ============================================================================
# PASSWORD AUTHENTICATION
# ============================================================================

# Use md5 or scram-sha-256 for replication connections
# Ensure pg_hba.conf has proper authentication configured for replication

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================

# Shared buffers - 25% of RAM for production
shared_buffers = 8GB

# Effective cache size - 50% of RAM
effective_cache_size = 16GB

# Work memory per operation
work_mem = 64MB

# Maintenance work memory
maintenance_work_mem = 2GB

# Random page access cost (SSD vs HDD)
# Lower for SSD (1.1), higher for HDD (4)
random_page_cost = 1.1

# ============================================================================
# QUERY PLANNING
# ============================================================================

# Enable all query optimization features
enable_seqscan = on
enable_indexscan = on
enable_bitmapscan = on
enable_tidscan = on
enable_sort = on
enable_hashagg = on
enable_material = on
enable_memoize = on

# ============================================================================
# MONITORING & STATISTICS
# ============================================================================

# Enable query statistics
shared_preload_libraries = 'pg_stat_statements'

# Auto vacuum settings
autovacuum = on
autovacuum_naptime = 10s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50

# Track statements for monitoring
track_activities = on
track_counts = on
track_io_timing = on

# ============================================================================
# BACKUP RELATED SETTINGS
# ============================================================================

# Enable backup mode for pg_basebackup
backup_target = DEFAULT

# Can perform backup during recovery (hot backup)
recovery_target_timeline = 'latest'

# ============================================================================
# STANDBY CONFIGURATION (Apply on Standby Server)
# ============================================================================

# These settings should be in recovery.conf or postgresql.conf on standby:

# Connection string to primary server
# primary_conninfo = 'host=primary.taskir.app port=5432 user=replication password=XXXX application_name=standby1'

# Replication slot name (if using slots)
# primary_slot_name = 'standby1'

# Standby mode (always on for continuous recovery)
# standby_mode = on

# Hot standby mode allows read-only queries during recovery
# hot_standby = on
# hot_standby_feedback = on (enables feedback to prevent query conflicts)

# ============================================================================
# REPLICATION SLOTS (Optional but Recommended)
# ============================================================================

# Replication slots ensure WAL files aren't removed before standby gets them
# Create slots with: SELECT * FROM pg_create_physical_replication_slot('standby1');

# Slot retention policy (keep WAL files for replication)
wal_keep_segments = 0  # Rely on slots instead of keeping WAL files

# ============================================================================
# IMPORTANT NOTES
# ============================================================================

# 1. After modifying this file, restart PostgreSQL:
#    sudo systemctl restart postgresql
#
# 2. Standby server needs recovery.conf or modified postgresql.conf with:
#    - primary_conninfo pointing to primary
#    - standby_mode = on
#    - hot_standby = on
#
# 3. pg_hba.conf must allow replication connections:
#    # IPv4 local connections for replication
#    host    replication     replication     127.0.0.1/32            md5
#    host    replication     replication     <standby_ip>/32         md5
#
# 4. Initial standby setup using pg_basebackup:
#    pg_basebackup -h primary.taskir.app -U replication -D /var/lib/postgresql/14/main \
#      -Fp -Xs -P -v -R
#
# 5. Verify replication with:
#    SELECT * FROM pg_stat_replication;
#    SELECT * FROM pg_replication_slots;

