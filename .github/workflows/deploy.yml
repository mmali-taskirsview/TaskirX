name: Deploy to EKS

on:
  push:
    branches: [main, production]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'docker/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER_NAME: taskir-prod-cluster
  KUBERNETES_VERSION: 1.28

jobs:
  build:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    outputs:
      backend-image: ${{ steps.backend-image.outputs.image }}
      frontend-image: ${{ steps.frontend-image.outputs.image }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build backend image
        id: backend-image
        run: |
          IMAGE_TAG=${{ github.sha }}
          BACKEND_IMAGE=${{ env.ECR_REGISTRY }}/taskir-backend:${IMAGE_TAG}
          BACKEND_LATEST=${{ env.ECR_REGISTRY }}/taskir-backend:latest
          
          docker build -t ${BACKEND_IMAGE} -t ${BACKEND_LATEST} -f backend/Dockerfile backend/
          docker push ${BACKEND_IMAGE}
          docker push ${BACKEND_LATEST}
          
          echo "image=${BACKEND_IMAGE}" >> $GITHUB_OUTPUT
      
      - name: Build frontend image
        id: frontend-image
        run: |
          IMAGE_TAG=${{ github.sha }}
          FRONTEND_IMAGE=${{ env.ECR_REGISTRY }}/taskir-frontend:${IMAGE_TAG}
          FRONTEND_LATEST=${{ env.ECR_REGISTRY }}/taskir-frontend:latest
          
          docker build -t ${FRONTEND_IMAGE} -t ${FRONTEND_LATEST} -f frontend/Dockerfile frontend/
          docker push ${FRONTEND_IMAGE}
          docker push ${FRONTEND_LATEST}
          
          echo "image=${FRONTEND_IMAGE}" >> $GITHUB_OUTPUT
      
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.backend-image.outputs.image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Deploy backend to EKS
        run: |
          kubectl set image deployment/taskir-backend \
            -n taskir-prod \
            backend=${{ needs.build.outputs.backend-image }} \
            --record
          
          kubectl rollout status deployment/taskir-backend -n taskir-prod --timeout=5m
      
      - name: Verify deployment health
        run: |
          kubectl get pods -n taskir-prod -l app=taskir-backend
          kubectl get svc -n taskir-prod
          
          # Wait for endpoints to be ready
          kubectl wait --for=condition=Ready pod \
            -l app=taskir-backend \
            -n taskir-prod \
            --timeout=300s
      
      - name: Run smoke tests
        run: |
          ALB_ENDPOINT=$(kubectl get svc taskir-backend -n taskir-prod -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          # Wait for ALB endpoint
          for i in {1..30}; do
            if [ ! -z "$ALB_ENDPOINT" ]; then
              echo "ALB endpoint: $ALB_ENDPOINT"
              break
            fi
            echo "Waiting for ALB endpoint..."
            sleep 10
            ALB_ENDPOINT=$(kubectl get svc taskir-backend -n taskir-prod -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          done
          
          # Health check
          curl -f http://${ALB_ENDPOINT}/health || exit 1
      
      - name: Notify deployment status
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Deployment to EKS: ${{ job.status }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
          fields: repo,message,commit,author

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Rollback deployment
        run: |
          kubectl rollout undo deployment/taskir-backend -n taskir-prod
          kubectl rollout status deployment/taskir-backend -n taskir-prod --timeout=5m
      
      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: 'warning'
          text: 'Deployment rolled back due to failure'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  monitor:
    name: Post-Deployment Monitoring
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}
      
      - name: Get deployment metrics
        run: |
          echo "=== Deployment Status ==="
          kubectl get deployment taskir-backend -n taskir-prod
          
          echo "=== Pod Status ==="
          kubectl get pods -n taskir-prod -l app=taskir-backend
          
          echo "=== Service Status ==="
          kubectl get svc taskir-backend -n taskir-prod
          
          echo "=== Recent Events ==="
          kubectl get events -n taskir-prod --sort-by='.lastTimestamp' | tail -20
      
      - name: Check CloudWatch metrics
        run: |
          aws cloudwatch get-metric-statistics \
            --namespace AWS/EKS \
            --metric-name CPUUtilization \
            --dimensions Name=ClusterName,Value=${{ env.EKS_CLUSTER_NAME }} \
            --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --period 300 \
            --statistics Average,Maximum \
            --region ${{ env.AWS_REGION }}

---
# GitHub Actions Secrets Required:
# AWS_ACCOUNT_ID: Your AWS account ID
# SLACK_WEBHOOK_URL: Slack webhook for notifications

