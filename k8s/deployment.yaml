---
# Kubernetes Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: taskir
  labels:
    app: taskir

---
# ConfigMap for environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskir-config
  namespace: taskir
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  DATABASE_POOL_MIN: "5"
  DATABASE_POOL_MAX: "20"
  REDIS_MAX_RETRIES: "3"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"

---
# Secret for sensitive configuration
apiVersion: v1
kind: Secret
metadata:
  name: taskir-secrets
  namespace: taskir
type: Opaque
stringData:
  DATABASE_URL: "postgresql://taskir:secretpassword@taskir-postgres:5432/taskir"
  REDIS_URL: "redis://taskir-redis:6379/0"
  JWT_SECRET: "jwt-secret-key-change-in-production"
  JWT_REFRESH_SECRET: "jwt-refresh-secret-key-change-in-production"
  API_KEY: "api-key-change-in-production"

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taskir-postgres
  namespace: taskir
spec:
  serviceName: taskir-postgres
  replicas: 1
  selector:
    matchLabels:
      app: taskir-postgres
  template:
    metadata:
      labels:
        app: taskir-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:14-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: taskir
        - name: POSTGRES_USER
          value: taskir
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: taskir-secrets
              key: DATABASE_PASSWORD
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "taskir"]
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "taskir"]
          initialDelaySeconds: 5
          periodSeconds: 5
      securityContext:
        fsGroup: 999
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: taskir-postgres
  namespace: taskir
spec:
  clusterIP: None
  selector:
    app: taskir-postgres
  ports:
  - port: 5432
    targetPort: 5432

---
# Redis StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: taskir-redis
  namespace: taskir
spec:
  serviceName: taskir-redis
  replicas: 1
  selector:
    matchLabels:
      app: taskir-redis
  template:
    metadata:
      labels:
        app: taskir-redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - "--appendonly"
        - "yes"
        - "--requirepass"
        - "redispassword"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: redis-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: taskir-redis
  namespace: taskir
spec:
  clusterIP: None
  selector:
    app: taskir-redis
  ports:
  - port: 6379
    targetPort: 6379

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskir-backend
  namespace: taskir
  labels:
    app: taskir-backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskir-backend
  template:
    metadata:
      labels:
        app: taskir-backend
    spec:
      serviceAccountName: taskir-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: backend
        image: ghcr.io/taskir/taskir/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
          protocol: TCP
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: taskir-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: taskir-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: taskir-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: taskir-secrets
              key: JWT_SECRET
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: taskir-config
              key: LOG_LEVEL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - taskir-backend
              topologyKey: kubernetes.io/hostname

---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: taskir-backend
  namespace: taskir
  labels:
    app: taskir-backend
spec:
  type: ClusterIP
  selector:
    app: taskir-backend
  ports:
  - port: 80
    targetPort: 3000
    protocol: TCP
    name: http

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskir-frontend
  namespace: taskir
  labels:
    app: taskir-frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskir-frontend
  template:
    metadata:
      labels:
        app: taskir-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
      - name: frontend
        image: ghcr.io/taskir/taskir/frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        env:
        - name: REACT_APP_API_URL
          value: "https://api.taskir.example.com"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: cache
          mountPath: /var/cache/nginx
        - name: run
          mountPath: /var/run
      volumes:
      - name: cache
        emptyDir: {}
      - name: run
        emptyDir: {}

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: taskir-frontend
  namespace: taskir
  labels:
    app: taskir-frontend
spec:
  type: ClusterIP
  selector:
    app: taskir-frontend
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http

---
# ServiceAccount for Backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: taskir-backend
  namespace: taskir

---
# Role for Backend
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: taskir-backend
  namespace: taskir
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]

---
# RoleBinding for Backend
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: taskir-backend
  namespace: taskir
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: taskir-backend
subjects:
- kind: ServiceAccount
  name: taskir-backend
  namespace: taskir

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: taskir-ingress
  namespace: taskir
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - taskir.example.com
    - api.taskir.example.com
    secretName: taskir-tls-cert
  rules:
  - host: taskir.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: taskir-frontend
            port:
              number: 80
  - host: api.taskir.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: taskir-backend
            port:
              number: 80

---
# HorizontalPodAutoscaler for Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskir-backend-hpa
  namespace: taskir
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskir-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# HorizontalPodAutoscaler for Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: taskir-frontend-hpa
  namespace: taskir
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: taskir-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 85

---
# NetworkPolicy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: taskir-network-policy
  namespace: taskir
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: taskir
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: taskir
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
