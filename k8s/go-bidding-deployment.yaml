apiVersion: v1
kind: ConfigMap
metadata:
  name: go-bidding-config
  namespace: taskir
data:
  PORT: "8080"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  BACKEND_API_URL: http://nestjs-backend:3000
  AI_SERVICE_URL: http://ad-matching:6002/api
  FRAUD_SERVICE_URL: http://fraud-detection:6001/api
  OPTIMIZATION_SERVICE_URL: http://bid-optimization:6003/api

---
apiVersion: v1
kind: Secret
metadata:
  name: go-bidding-secret
  namespace: taskir
type: Opaque
stringData:
  REDIS_PASSWORD: taskir_redis_password_2026

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-bidding
  namespace: taskir
spec:
  replicas: 5
  selector:
    matchLabels:
      app: go-bidding
  template:
    metadata:
      labels:
        app: go-bidding
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: go-bidding
        image: your-registry/taskir-go-bidding:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: go-bidding-config
        - secretRef:
            name: go-bidding-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 3
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "go mod tidy && go mod download && go mod verify"]

---
apiVersion: v1
kind: Service
metadata:
  name: go-bidding
  namespace: taskir
spec:
  selector:
    app: go-bidding
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-bidding-hpa
  namespace: taskir
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-bidding
  minReplicas: 5
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
