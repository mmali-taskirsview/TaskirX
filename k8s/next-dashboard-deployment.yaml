apiVersion: v1
kind: ConfigMap
metadata:
  name: next-dashboard-config
  namespace: taskir
data:
  NEXT_PUBLIC_USE_MOCK_DATA: "false"
  NODE_ENV: production
  PORT: "3001"
  NEXT_PUBLIC_API_URL: https://api.taskirx.com
  NEXT_PUBLIC_BIDDING_URL: https://bidding.taskirx.com/api
  NEXT_PUBLIC_BACKEND_URL: https://api.taskirx.com/api
  NEXT_PUBLIC_FRAUD_URL: https://api.taskirx.com/fraud/api
  NEXT_PUBLIC_MATCHING_URL: https://api.taskirx.com/matching/api
  NEXT_PUBLIC_OPTIMIZATION_URL: https://api.taskirx.com/optimization/api

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: next-dashboard
  namespace: taskir
spec:
  replicas: 1
  selector:
    matchLabels:
      app: next-dashboard
  template:
    metadata:
      labels:
        app: next-dashboard
    spec:
      containers:
      - name: next-dashboard
        image: sin.ocir.io/axoodqjqcaam/taskir-dashboard:latest
        ports:
        - containerPort: 3001
        envFrom:
        - configMapRef:
            name: next-dashboard-config
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "512Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: next-dashboard
  namespace: taskir
spec:
  selector:
    app: next-dashboard
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
