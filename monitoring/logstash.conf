# Logstash Configuration for TaskirX v3
# Ingests logs from multiple sources and enriches them

input {
  # Docker logs via GELF (Graylog Extended Log Format)
  udp {
    host => "0.0.0.0"
    port => 12201
    codec => gelf
    type => "docker"
  }

  # Syslog input for system logs
  udp {
    host => "0.0.0.0"
    port => 514
    codec => multiline {
      pattern => "^%{SYSLOGLINE}"
      what => "next"
    }
    type => "syslog"
  }

  # HTTP input for application logs
  http {
    host => "0.0.0.0"
    port => 8080
    codec => json
    type => "http"
  }

  # File input for application logs
  file {
    path => "/var/log/taskir/*.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^%{TIMESTAMP_ISO8601}"
      negate => true
      what => "previous"
    }
    type => "taskir"
  }

  # PostgreSQL logs
  file {
    path => "/var/log/postgresql/*.log"
    start_position => "beginning"
    type => "postgres"
  }

  # Redis logs
  file {
    path => "/var/log/redis/*.log"
    start_position => "beginning"
    type => "redis"
  }
}

filter {
  # Parse common log formats
  if [type] == "taskir" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} \[%{DATA:component}\] %{GREEDYDATA:message}" }
      overwrite => ["message"]
    }
    
    # Extract request IDs for correlation
    grok {
      match => { "message" => "request_id: %{UUID:request_id}" }
      tag_on_failure => []
    }
    
    # Parse JSON if present
    if [message] =~ /^\{/ {
      json {
        source => "message"
        target => "json"
      }
    }
  }

  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGLINE}" }
    }
  }

  if [type] == "postgres" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{NUMBER:pid}\] %{DATA:username}@%{DATA:database} %{LOGLEVEL:level}: %{GREEDYDATA:message}" }
    }
    
    # Extract slow query information
    if "slow query" in [message] {
      grok {
        match => { "message" => "duration: %{NUMBER:duration:float}" }
      }
      
      if [duration] {
        if [duration] > 1000 {
          mutate {
            add_field => { "alert_type" => "slow_query" }
          }
        }
      }
    }
  }

  if [type] == "redis" {
    grok {
      match => { "message" => "%{DATA:timestamp} \* %{GREEDYDATA:message}" }
    }
  }

  # GeoIP enrichment
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
    }
  }

  # Add metadata
  mutate {
    add_field => {
      "environment" => "production"
      "version" => "3.0.0"
      "application" => "taskir"
      "ingest_timestamp" => "%{@timestamp}"
    }
  }

  # Add severity levels for easier filtering
  if [level] == "ERROR" or [level] == "CRITICAL" {
    mutate {
      add_field => { "severity" => "high" }
    }
  } else if [level] == "WARN" {
    mutate {
      add_field => { "severity" => "medium" }
    }
  } else {
    mutate {
      add_field => { "severity" => "low" }
    }
  }

  # Date parsing for better timestamp handling
  date {
    match => ["timestamp", "ISO8601", "yyyy-MM-dd HH:mm:ss"]
    target => "@timestamp"
    tag_on_failure => []
  }
}

output {
  # Send all logs to Elasticsearch
  elasticsearch {
    hosts => ["${ES_HOSTS}"]
    index => "logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  # Debug output to stdout (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }

  # Send critical alerts to separate index for faster querying
  if [severity] == "high" {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      index => "alerts-%{+YYYY.MM.dd}"
    }
  }

  # Send slow queries to monitoring index
  if [alert_type] == "slow_query" {
    elasticsearch {
      hosts => ["${ES_HOSTS}"]
      index => "slowqueries-%{+YYYY.MM.dd}"
    }
  }
}
